name: Сборка Android APK (Astra)

# Собирает debug-APK в облаке GitHub (бесплатно для публичного репозитория).
# Запуск: автоматически при push в main, либо вручную (вкладка Actions → Run workflow).
# Готовый файл — внизу страницы запуска, артефакт "astra-apk".

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # чтобы закоммитить готовый APK обратно в репо
    steps:
      - uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Java 21 (нужен для Capacitor/Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Сборка веб-части и синхронизация Capacitor
        working-directory: app
        run: |
          npm install
          npm run build
          npx cap sync android

      - name: Фиксированный keystore подписи (создать один раз при первом запуске)
        working-directory: app/android/app
        run: |
          if [ ! -f astra-debug.keystore ]; then
            keytool -genkeypair -v -keystore astra-debug.keystore \
              -storepass astrasky -keypass astrasky -alias astra \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Astra, OU=Astra, O=Astra, L=City, ST=State, C=RU"
            echo "СОЗДАН новый keystore — будет закоммичен и переиспользован далее"
          else
            echo "keystore уже есть — переиспользуем (подпись стабильна)"
          fi

      - name: Сборка APK (Gradle)
        working-directory: app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Выложить APK как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: astra-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: OTA-бандл веб-части + манифест (для живых обновлений)
        run: |
          mkdir -p apk
          # bundle.zip = содержимое dist (index.html в корне zip — так ждёт Capgo)
          (cd app/dist && zip -r -q ../../apk/bundle.zip .)
          BASE=$(grep -oP "APP_VERSION = '\K[0-9.]+" app/src/lib/version.ts)
          VER="${BASE}.${{ github.run_number }}"
          URL="https://raw.githubusercontent.com/gggssaggg-beep/astra/main/apk/bundle.zip"
          printf '{\n  "version": "%s",\n  "url": "%s",\n  "notes": "build %s (%s)"\n}\n' \
            "$VER" "$URL" "$VER" "${GITHUB_SHA::7}" > apk/latest.json
          echo "OTA версия: $VER"

      - name: Обновить APK + OTA-бандл в репо (та же ссылка для скачивания)
        run: |
          cp app/android/app/build/outputs/apk/debug/app-debug.apk apk/Astra.apk
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -f: keystore подпадает под *.keystore в .gitignore, но нам нужно закоммитить
          # именно этот фиксированный ключ (первый запуск), дальше он уже в репо.
          git add -f app/android/app/astra-debug.keystore
          git add apk/Astra.apk apk/bundle.zip apk/latest.json
          git commit -m "APK + OTA авто-сборка [skip ci]" || echo "без изменений"
          git push
